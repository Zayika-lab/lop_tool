<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstruktion Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7; --bgCard: #ffffff; --border: #e0e3e8; --borderStrong: #c8cdd5;
    --text: #3a4250; --textStrong: #111827; --textMuted: #7b8494; --textFaint: #bfc5ce;
    --accent: #eceef2; --popBg: #ffffff; --shadow: rgba(0,0,0,0.13);
    --done-bg: #dcfce7; --done-border: #86efac; --done-text: #15803d;
    --active-bg: #fef9c3; --active-border: #fde047; --active-text: #a16207;
    --blocked-bg: #fee2e2; --blocked-border: #fca5a5; --blocked-text: #dc2626;
    --review-bg: #e0e7ff; --review-border: #a5b4fc; --review-text: #4338ca;
    --kommt-bg: #f0f1f4; --kommt-border: #c8cdd5; --kommt-text: #7b8494;
    --none-bg: #f0f1f4; --none-border: #dde0e5; --none-text: #a0a8b4;
    --section-bg: #f8f9fb; --section-border: #d4d8e0;
  }
  [data-theme="dark"] {
    --bg: #0d0d1a; --bgCard: #111128; --border: #1e1e3a; --borderStrong: #2a2a5a;
    --text: #c8d6e5; --textStrong: #e2e8f0; --textMuted: #667788; --textFaint: #334455;
    --accent: #1a1a3a; --popBg: #151530; --shadow: rgba(0,0,0,0.5);
    --done-bg: #0d3320; --done-border: #1a6640; --done-text: #4ade80;
    --active-bg: #332800; --active-border: #665000; --active-text: #facc15;
    --blocked-bg: #3b1010; --blocked-border: #7a2020; --blocked-text: #f87171;
    --review-bg: #1a1a40; --review-border: #3535a0; --review-text: #818cf8;
    --kommt-bg: #1a1a2e; --kommt-border: #2a2a4a; --kommt-text: #556677;
    --none-bg: #1a1a2e; --none-border: #2a2a4a; --none-text: #556677;
    --section-bg: #0f0f24; --section-border: #1e1e3a;
  }

  body { font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .3s, color .3s; }

  /* Login */
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
  .login-screen h1 { font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--textStrong); }
  .login-btn { display: flex; align-items: center; gap: 10px; padding: 12px 28px; background: var(--bgCard); border: 1px solid var(--borderStrong); border-radius: 6px; color: var(--textStrong); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all .2s; }
  .login-btn:hover { background: var(--accent); }

  /* Header */
  .header { background: var(--bgCard); border-bottom: 1px solid var(--border); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--textStrong); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .header-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--done-text); box-shadow: 0 0 6px var(--done-text); }
  .header-actions { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
  .user-info { display: flex; align-items: center; gap: 8px; margin-right: 8px; font-size: 11px; color: var(--textMuted); }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--borderStrong); }

  /* Buttons */
  .btn { padding: 5px 12px; background: transparent; border: 1px solid transparent; border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; letter-spacing: 1px; }
  .btn.active { background: var(--accent); border-color: var(--borderStrong); color: var(--textStrong); }
  .btn-sm { padding: 4px 10px; background: var(--accent); border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; }
  .btn-sm:hover { background: var(--borderStrong); color: var(--textStrong); }
  .btn-edit { background: none; border: none; color: var(--textMuted); cursor: pointer; font-size: 10px; font-family: inherit; padding: 1px 3px; }
  .btn-edit:hover { color: var(--textStrong); }
  .btn-edit.danger { color: var(--blocked-text); }
  .btn-edit.danger:hover { color: var(--blocked-border); }
  .btn-theme { padding: 4px 10px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 14px; }
  .btn-editmode { padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
  .btn-editmode.on { background: var(--blocked-bg); border: 1px solid var(--blocked-border); color: var(--blocked-text); }
  .btn-editmode.off { background: transparent; border: 1px solid var(--borderStrong); color: var(--textMuted); }
  .btn-logout { padding: 5px 12px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 10px; font-family: inherit; }
  .btn-undo { padding: 5px 12px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; transition: all .15s; }
  .btn-undo:hover:not(:disabled) { background: var(--accent); color: var(--textStrong); }
  .btn-undo:disabled { opacity: 0.35; cursor: default; }
  .divider { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  /* Table */
  .content { padding: 14px 18px; }
  .legend { display: flex; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 11px; height: 11px; border-radius: 2px; }
  .table-wrap { overflow-x: auto; position: relative; padding-right: 20px; }
  table { border-collapse: collapse; width: 100%; min-width: 600px; }
  th { padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--textMuted); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
  th.left { text-align: left; min-width: 220px; }
  td { padding: 5px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
  td.step-main { font-weight: 700; color: var(--textStrong); background: var(--bgCard); }
  td.step-sub { color: var(--textMuted); font-size: 11px; }
  td.cell { text-align: center; position: relative; cursor: pointer; vertical-align: top; }
  td.cell-main { text-align: center; background: var(--bgCard); }

  /* Indentation */
  .indent-section { padding-left: 8px !important; }
  .indent-main { padding-left: 26px !important; }
  .indent-sub { padding-left: 46px !important; }

  /* Section row */
  tr.section-row td { background: var(--section-bg); border-bottom: 2px solid var(--section-border); padding: 8px 12px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--textMuted); display: flex; align-items: center; gap: 6px; }

  /* Collapsible */
  .collapse-toggle { background: none; border: none; cursor: pointer; color: var(--textMuted); font-size: 10px; font-family: inherit; padding: 2px 4px; transition: transform .2s; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; }
  .collapse-toggle:hover { background: var(--accent); color: var(--textStrong); }
  .collapse-toggle.collapsed { transform: rotate(-90deg); }

  /* Cell chips */
  .chip { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .chip.done { background: var(--done-bg); border: 1px solid var(--done-border); color: var(--done-text); }
  .chip.active { background: var(--active-bg); border: 1px solid var(--active-border); color: var(--active-text); }
  .chip.blocked { background: var(--blocked-bg); border: 1px solid var(--blocked-border); color: var(--blocked-text); }
  .chip.review { background: var(--review-bg); border: 1px solid var(--review-border); color: var(--review-text); }
  .chip.kommt { background: var(--kommt-bg); border: 1px solid var(--kommt-border); color: var(--kommt-text); }

  /* Dot */
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot.done { background: var(--done-text); }
  .dot.active { background: var(--active-text); }
  .dot.blocked { background: var(--blocked-text); }
  .dot.review { background: var(--review-text); }
  .dot.kommt { background: var(--kommt-text); }
  .dot.mixed { background: conic-gradient(var(--active-text) 0% 33%, var(--blocked-text) 33% 66%, var(--review-text) 66% 100%); }

  /* Popup */
  .popup-overlay { position: fixed; inset: 0; z-index: 99; }
  .popup { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--popBg); border: 1px solid var(--borderStrong); border-radius: 8px; padding: 10px; z-index: 100; min-width: 190px; box-shadow: 0 8px 28px var(--shadow); }
  .popup-label { font-size: 9px; color: var(--textMuted); letter-spacing: 1px; margin-bottom: 5px; }
  .popup-btn { display: block; width: 100%; padding: 4px 8px; background: transparent; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; text-align: left; margin-bottom: 2px; }
  .popup-btn.selected { border-color: var(--borderStrong); }
  .popup-person { padding: 2px 7px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; }
  .popup-person.selected { background: var(--accent); color: var(--textStrong); }
  .popup-person.suggested { border-color: var(--review-border); background: var(--review-bg); color: var(--review-text); }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--popBg); border: 1px solid var(--borderStrong); border-radius: 8px; padding: 24px; min-width: 280px; max-width: 400px; box-shadow: 0 12px 40px var(--shadow); }
  .modal h3 { margin-bottom: 10px; font-weight: 600; color: var(--textStrong); font-size: 13px; }
  .modal p { font-size: 11px; color: var(--textMuted); margin-bottom: 10px; }
  input.field { padding: 5px 8px; background: var(--bg); border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textStrong); font-size: 11px; font-family: inherit; outline: none; width: 100%; }
  .modal-actions { display: flex; gap: 6px; margin-top: 12px; justify-content: flex-end; }
  .modal-btn { padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; border: 1px solid var(--borderStrong); background: var(--accent); color: var(--textStrong); }
  .modal-btn.primary { background: var(--done-bg); border-color: var(--done-border); color: var(--done-text); }
  .modal-btn.danger { background: var(--blocked-bg); border-color: var(--blocked-border); color: var(--blocked-text); }

  /* Progress */
  .progress-bar { height: 5px; background: var(--accent); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .mini-bar { display: flex; align-items: center; gap: 5px; }
  .mini-track { height: 3px; width: 44px; background: var(--accent); border-radius: 2px; overflow: hidden; }

  /* Cards */
  .section-title { font-size: 13px; font-weight: 700; color: var(--textStrong); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .card { background: var(--bgCard); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
  .next-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(--bgCard); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 5px; }

  /* Team bar */
  .team-bar { margin-top: 16px; padding: 12px; background: var(--bgCard); border-radius: 6px; border: 1px solid var(--border); }
  .team-tag { padding: 3px 8px; background: var(--accent); border: 1px solid var(--borderStrong); border-radius: 4px; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; }

  /* Saving indicator */
  .save-indicator { position: fixed; bottom: 16px; right: 16px; padding: 6px 14px; background: var(--done-bg); border: 1px solid var(--done-border); color: var(--done-text); border-radius: 6px; font-size: 11px; font-family: inherit; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
  .save-indicator.show { opacity: 1; }

  .repeat-badge { font-size: 8px; color: var(--review-text); border: 1px solid var(--review-border); border-radius: 2px; padding: 0 3px; line-height: 14px; }
  .sub-arrow { color: var(--textFaint); margin-right: 3px; }

  /* Rename input inline */
  .rename-input { background: var(--bg); border: 1px solid var(--borderStrong); border-radius: 3px; color: var(--textStrong); font-size: 11px; font-family: inherit; padding: 2px 5px; outline: none; width: 100%; }
  .rename-input:focus { border-color: var(--review-border); box-shadow: 0 0 0 2px var(--review-bg); }

  /* Scroll spacer */
  .scroll-spacer { pointer-events: none; }

  /* Section indicator dot in header */
  .section-indicator { display: inline-flex; gap: 2px; margin-left: 4px; }

  /* Add buttons in header row */
  .add-section-btn { background: none; border: 1px dashed var(--borderStrong); color: var(--textFaint); cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 3px; font-family: inherit; margin-left: 6px; }
  .add-section-btn:hover { color: var(--textStrong); border-color: var(--textMuted); }
  .add-step-btn { background: none; border: 1px dashed var(--borderStrong); color: var(--textFaint); cursor: pointer; font-size: 9px; padding: 1px 6px; border-radius: 3px; font-family: inherit; }
  .add-step-btn:hover { color: var(--textStrong); border-color: var(--textMuted); }

  /* Name suggestion dropdown */
  .name-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--popBg); border: 1px solid var(--borderStrong); border-radius: 4px; box-shadow: 0 4px 12px var(--shadow); z-index: 1001; max-height: 120px; overflow-y: auto; }
  .name-suggestion { padding: 4px 8px; cursor: pointer; font-size: 11px; font-family: inherit; color: var(--text); }
  .name-suggestion:hover { background: var(--accent); color: var(--textStrong); }

  /* Responsive */
  @media (max-width: 640px) {
    .header { padding: 10px 12px; }
    .content { padding: 10px 12px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="app"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrLP5LF4OmjAkyn6O0o8d6bLqu0VqtDfs",
  authDomain: "lop-tool.firebaseapp.com",
  projectId: "lop-tool",
  storageBucket: "lop-tool.firebasestorage.app",
  messagingSenderId: "137174368951",
  appId: "1:137174368951:web:1bdf9e3d7100789f9f4332"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

const STATUS_LABELS = { none: "—", done: "Erledigt", active: "In Arbeit", blocked: "Blockiert", review: "Review", kommt: "Kommt" };
const uid = () => Math.random().toString(36).slice(2, 9);

const DEFAULT_STEPS = [
  { id:"s1", name:"CAD-Anpassungen", repeatable:false, sectionId:"sec1", substeps:[{id:"s1a",name:"Modell"},{id:"s1b",name:"Zeichnung"}] },
  { id:"s2", name:"Toleranz-Analyse", repeatable:false, sectionId:"sec1", substeps:[{id:"s2a",name:"Skizzen-Modell"},{id:"s2b",name:"Skizzen-Zeichnung"},{id:"s2c",name:"Toleranz-Berechnung"},{id:"s2d",name:"Toleranz-Auswertung"}] },
  { id:"s3", name:"CAD-Daten-Erstellung", repeatable:false, sectionId:"sec1", substeps:[{id:"s3a",name:"Anforderungen-Übernahme"},{id:"s3b",name:"Toleranz-Übernahme"},{id:"s3c",name:"Kollisions-Prüfung"},{id:"s3d",name:"Modell-Bemaßung"},{id:"s3e",name:"Prüfmaße"}] },
  { id:"s4", name:"SAP-Pflege", repeatable:false, sectionId:"sec2", substeps:[{id:"s4a",name:"Teile-Guss"},{id:"s4b",name:"Teile-Fräs"},{id:"s4c",name:"Teile-Verbindung"},{id:"s4d",name:"Teile-Dichtung"}] },
  { id:"s5", name:"CAD-Daten-Ablage", repeatable:false, sectionId:"sec2", substeps:[] },
  { id:"s6", name:"3D-Druck/Prüfung", repeatable:true, sectionId:"sec3", substeps:[{id:"s6a",name:"Daten-Abgabe"},{id:"s6b",name:"Druck-Erfolgreich"},{id:"s6c",name:"Bearbeitung-Erfolgreich"},{id:"s6d",name:"Druck-Verbaut/Analysiert"}] },
  { id:"s7", name:"Prüfzeichnungen", repeatable:false, sectionId:"sec3", substeps:[{id:"s7a",name:"Daten-Abgabe"},{id:"s7b",name:"Prüfzeichnungen-Erstellt"}] },
  { id:"s8", name:"Lieferung", repeatable:false, sectionId:"sec3", substeps:[{id:"s8a",name:"Anfrage / Daten-Abgabe"},{id:"s8b",name:"RM-Erhalt"},{id:"s8c",name:"RM-Bearbeitet"},{id:"s8d",name:"Bestellung / Daten-Abgabe"}] },
];
const DEFAULT_SECTIONS = [
  { id:"sec1", name:"Konstruktion" },
  { id:"sec2", name:"Datenpflege" },
  { id:"sec3", name:"Fertigung & Lieferung" },
];
const DEFAULT_CONSTRUCTIONS = [{id:"c1",name:"NM 045"},{id:"c2",name:"NM 011"},{id:"c3",name:"NM 021"},{id:"c4",name:"NM 031"}];
const DEFAULT_TEAM = ["OZ","REV","Wladi","Sabrina"];

// ─── App State ───
let state = {
  user: null,
  steps: DEFAULT_STEPS,
  sections: DEFAULT_SECTIONS,
  constructions: DEFAULT_CONSTRUCTIONS,
  team: DEFAULT_TEAM,
  matrix: {},
  view: "matrix",
  theme: "light",
  editMode: false,
  activeCell: null,
  collapsed: {},
  collapsedSections: {},
  saving: false,
  showSaved: false,
  renaming: null, // {type, id, parentId?, originalName}
  modal: null,
};

let saveTimeout = null;
let unsubscribe = null;
let pendingSave = false;

// ─── Undo Stack ───
const MAX_UNDO = 10;
let undoStack = [];

function pushUndo() {
  const snapshot = JSON.stringify({
    steps: state.steps,
    sections: state.sections,
    constructions: state.constructions,
    team: state.team,
    matrix: state.matrix,
  });
  undoStack.push(snapshot);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

function performUndo() {
  if (undoStack.length === 0) return;
  const snapshot = JSON.parse(undoStack.pop());
  state.steps = snapshot.steps;
  state.sections = snapshot.sections;
  state.constructions = snapshot.constructions;
  state.team = snapshot.team;
  state.matrix = snapshot.matrix;
  saveData();
  render();
}

// Ctrl+Z handler
document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.target.closest("input,textarea")) {
    e.preventDefault();
    performUndo();
  }
});

// ─── Firebase Sync ───
function docRef() { return db.collection("tracker").doc("shared"); }

function loadData() {
  if (unsubscribe) unsubscribe();
  unsubscribe = docRef().onSnapshot(snap => {
    if (pendingSave) return;
    if (snap.exists) {
      const d = snap.data();
      if (d.steps) {
        state.steps = d.steps;
        state.steps.forEach(s => { if(!s.sectionId) s.sectionId = "sec_unsorted"; });
      }
      if (d.sections) state.sections = d.sections;
      if (d.constructions) state.constructions = d.constructions;
      if (d.team) state.team = d.team;
      if (d.matrix) state.matrix = d.matrix;
      render();
    }
  });
}

function saveData() {
  clearTimeout(saveTimeout);
  pendingSave = true;
  saveTimeout = setTimeout(async () => {
    state.saving = true; render();
    try {
      await docRef().set({
        steps: state.steps,
        sections: state.sections || [],
        constructions: state.constructions,
        team: state.team,
        matrix: state.matrix,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: state.user?.displayName || "unknown",
      });
    } catch(e) { console.error("Save error:", e); }
    pendingSave = false;
    state.saving = false;
    state.showSaved = true; render();
    setTimeout(() => { state.showSaved = false; render(); }, 1500);
  }, 500);
}

// ─── Cell Helpers (single block per cell now) ───
function ck(cid, sid) { return cid+"::"+sid; }

function getCell(cid, sid) {
  return state.matrix[ck(cid, sid)] || {status:"none", person:""};
}

function setCell(cid, sid, data) {
  pushUndo();
  state.matrix[ck(cid, sid)] = data;
  state.activeCell = null;
  saveData();
  render();
}

function getAllIds(steps) {
  const ids = [];
  steps.forEach(s => { ids.push(s.id); (s.substeps||[]).forEach(ss => ids.push(ss.id)); });
  return ids;
}

function getProgress(cid) {
  const ids = getAllIds(state.steps);
  if (!ids.length) return {done:0, active:0, blocked:0, review:0, kommt:0, pct:0, total:0};
  let d=0, a=0, b=0, r=0, k=0, counted=0;
  ids.forEach(sid => {
    const c = getCell(cid, sid);
    if(c.status === "none") return; // Don't count "-"
    counted++;
    if(c.status==="done") d++;
    if(c.status==="active") a++;
    if(c.status==="blocked") b++;
    if(c.status==="review") r++;
    if(c.status==="kommt") k++;
  });
  const pct = counted > 0 ? Math.round(d/counted*100) : 0;
  return {done:d, active:a, blocked:b, review:r, kommt:k, pct, total:counted};
}

// Section indicator: aggregate status of all main steps in section
function getSectionIndicator(sectionId) {
  const sectionSteps = state.steps.filter(s => s.sectionId === sectionId);
  if (!sectionSteps.length) return "none";
  const statuses = new Set();
  sectionSteps.forEach(step => {
    const ids = [step.id, ...(step.substeps||[]).map(ss => ss.id)];
    ids.forEach(sid => {
      state.constructions.forEach(con => {
        const c = getCell(con.id, sid);
        if (c.status !== "none") statuses.add(c.status);
      });
    });
  });
  if (statuses.size === 0) return "none";
  if (statuses.has("blocked")) return "blocked";
  if (statuses.has("active")) return "active";
  if (statuses.has("review")) return "review";
  if (statuses.has("kommt") && !statuses.has("done")) return "kommt";
  if (statuses.size === 1 && statuses.has("done")) return "done";
  return "active";
}

function findName(sid) {
  for(const s of state.steps) {
    if(s.id===sid) return s.name;
    for(const ss of (s.substeps||[])) if(ss.id===sid) return s.name+" → "+ss.name;
  }
  return sid;
}

function getSuggestedPerson(sid, currentCid) {
  const persons = {};
  state.constructions.forEach(con => {
    if(con.id === currentCid) return;
    const c = getCell(con.id, sid);
    if(c.person) persons[c.person] = (persons[c.person]||0) + 1;
  });
  let best = null, bestCount = 0;
  Object.entries(persons).forEach(([p,c]) => { if(c > bestCount) { best = p; bestCount = c; } });
  return best;
}

// ─── Duplication ───
function duplicateSection(section) {
  pushUndo();
  const newSecId = "sec_" + uid();
  const newSec = { id: newSecId, name: section.name + " (Kopie)" };
  const idx = state.sections.indexOf(section);
  state.sections.splice(idx + 1, 0, newSec);
  // Duplicate all steps in this section
  const sectionSteps = state.steps.filter(s => s.sectionId === section.id);
  let insertIdx = state.steps.indexOf(sectionSteps[sectionSteps.length - 1]) + 1;
  if (sectionSteps.length === 0) insertIdx = state.steps.length;
  sectionSteps.forEach(step => {
    const newStep = duplicateStepData(step, newSecId);
    state.steps.splice(insertIdx++, 0, newStep);
  });
  saveData(); render();
}

function duplicateStep(step) {
  pushUndo();
  const newStep = duplicateStepData(step, step.sectionId);
  const idx = state.steps.indexOf(step);
  state.steps.splice(idx + 1, 0, newStep);
  saveData(); render();
}

function duplicateStepData(step, sectionId) {
  const newStepId = "s_" + uid();
  const newSubsteps = (step.substeps || []).map(ss => ({
    id: "ss_" + uid(),
    name: ss.name,
  }));
  return {
    id: newStepId,
    name: step.name + " (Kopie)",
    repeatable: step.repeatable,
    sectionId: sectionId,
    substeps: newSubsteps,
  };
}

function duplicateSubstep(step, sub) {
  pushUndo();
  const newSub = { id: "ss_" + uid(), name: sub.name + " (Kopie)" };
  const idx = step.substeps.indexOf(sub);
  step.substeps.splice(idx + 1, 0, newSub);
  saveData(); render();
}

// ─── Confirm Delete ───

  render();

// ─── Render ───
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v]) => {
    if(k==="className") el.className = v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k==="style" && typeof v==="object") Object.assign(el.style, v);
    else el.setAttribute(k, v);
  });
  children.flat(9).forEach(c => { if(c==null) return; el.appendChild(typeof c==="string" ? document.createTextNode(c) : c); });
  return el;
}

// Track scroll position to prevent jumps
let savedScrollTop = null;

function render() {
  // Save scroll position before re-render
  savedScrollTop = window.scrollY;

  document.body.setAttribute("data-theme", state.theme);
  const app = document.getElementById("app");
  app.innerHTML = "";
  if(!state.user) { app.appendChild(renderLogin()); return; }
  app.appendChild(renderHeader());
  const content = h("div", {className:"content"});
  if(state.view==="matrix") content.appendChild(renderMatrix());
  else if(state.view==="dashboard") content.appendChild(renderDashboard());
  else if(state.view==="tasks") content.appendChild(renderTasks());
  app.appendChild(content);

  // Save indicator
  app.appendChild(h("div", {className:"save-indicator"+(state.showSaved?" show":"")}, "✓ Gespeichert"));

  // Modal
  if(state.modal) app.appendChild(renderModal());

  // Restore scroll position after render
  if (savedScrollTop !== null) {
    requestAnimationFrame(() => {
      window.scrollTo(0, savedScrollTop);
    });
  }

  // Add scroll spacer for matrix view
  if(state.view==="matrix") {
    requestAnimationFrame(() => addScrollSpacer());
  }
}

function addScrollSpacer() {
  // Remove existing spacer
  const existing = document.getElementById("scroll-spacer");
  if (existing) existing.remove();
  // Add spacer so user can scroll until bottom row is at top of viewport
  const content = document.querySelector(".content");
  if (!content) return;
  const spacer = document.createElement("div");
  spacer.id = "scroll-spacer";
  spacer.className = "scroll-spacer";
  spacer.style.height = Math.max(0, window.innerHeight - 100) + "px";
  content.appendChild(spacer);
}

// ─── Inline Renaming ───
function startRenaming(type, id, parentId) {
  let originalName = "";
  if (type === "section") {
    const sec = state.sections.find(s => s.id === id);
    if (sec) originalName = sec.name;
  } else if (type === "step") {
    const step = state.steps.find(s => s.id === id);
    if (step) originalName = step.name;
  } else if (type === "substep") {
    const step = state.steps.find(s => s.id === parentId);
    if (step) {
      const sub = (step.substeps||[]).find(ss => ss.id === id);
      if (sub) originalName = sub.name;
    }
  } else if (type === "construction") {
    const con = state.constructions.find(c => c.id === id);
    if (con) originalName = con.name;
  }
  state.renaming = { type, id, parentId, originalName };
  render();
  setTimeout(() => {
    const inp = document.getElementById("rename-" + id);
    if (inp) { inp.focus(); inp.select(); }
  }, 30);
}

function commitRename(value) {
  if (!state.renaming) return;
  const { type, id, parentId } = state.renaming;
  const val = value.trim();
  if (!val) { state.renaming = null; render(); return; }
  pushUndo();
  if (type === "section") {
    const sec = state.sections.find(s => s.id === id);
    if (sec) sec.name = val;
  } else if (type === "step") {
    const step = state.steps.find(s => s.id === id);
    if (step) step.name = val;
  } else if (type === "substep") {
    const step = state.steps.find(s => s.id === parentId);
    if (step) {
      const sub = (step.substeps||[]).find(ss => ss.id === id);
      if (sub) sub.name = val;
    }
  } else if (type === "construction") {
    const con = state.constructions.find(c => c.id === id);
    if (con) con.name = val;
  }
  state.renaming = null;
  saveData(); render();
}

function cancelRename() {
  state.renaming = null;
  render();
}

function renderRenameInput(id, currentName) {
  const inp = h("input", {
    className: "rename-input",
    id: "rename-" + id,
    value: currentName,
    onKeydown: e => {
      if (e.key === "Enter") { commitRename(e.target.value); }
      if (e.key === "Escape") { cancelRename(); }
      e.stopPropagation();
    },
    onBlur: e => { commitRename(e.target.value); },
    onClick: e => e.stopPropagation(),
  });
  return inp;
}

function renderStepRows(tbody, step, si, stepsInScope) {
  const hasSubs = step.substeps && step.substeps.length > 0;
  const isCollapsed = state.collapsed[step.id];

  // Main row
  const tr = h("tr", null);
  const tdName = h("td", {className:"step-main indent-main"});
  const nameDiv = h("div", {style:{display:"flex",alignItems:"center",gap:"5px"}});

  // Collapse toggle
  if(hasSubs) {
    nameDiv.appendChild(h("button", {className:"collapse-toggle"+(isCollapsed?" collapsed":""), onClick:() => {
      state.collapsed[step.id] = !state.collapsed[step.id];
      render();
    }}, "▼"));
  } else {
    nameDiv.appendChild(h("span", {style:{width:"16px",display:"inline-block"}}));
  }

  if(step.repeatable) nameDiv.appendChild(h("span", {className:"repeat-badge"}, "↻"));

  // Step name
  if(state.editMode) {
    if (state.renaming && state.renaming.type === "step" && state.renaming.id === step.id) {
      nameDiv.appendChild(renderRenameInput(step.id, step.name));
    } else {
      nameDiv.appendChild(h("span", {style:{flex:"1",cursor:"pointer"}, onClick:() => startRenaming("step", step.id)}, step.name));
    }
  } else {
    nameDiv.appendChild(h("span", {style:{flex:"1"}}, step.name));
  }

  if(state.editMode && !(state.renaming && state.renaming.type === "step" && state.renaming.id === step.id)) {
    const btns = h("span", {style:{display:"flex",gap:"1px",flexShrink:"0"}});
    // Move up/down
    if(si > 0) btns.appendChild(h("button", {className:"btn-edit", onClick:() => {
      pushUndo();
      const idx = stepsInScope.indexOf(step);
      const globalIdx = state.steps.indexOf(step);
      const prevStep = stepsInScope[idx-1];
      const prevGlobalIdx = state.steps.indexOf(prevStep);
      state.steps.splice(globalIdx, 1);
      state.steps.splice(prevGlobalIdx, 0, step);
      saveData(); render();
    }}, "▲"));
    if(si < stepsInScope.length-1) btns.appendChild(h("button", {className:"btn-edit", onClick:() => {
      pushUndo();
      const idx = stepsInScope.indexOf(step);
      const globalIdx = state.steps.indexOf(step);
      const nextStep = stepsInScope[idx+1];
      const nextGlobalIdx = state.steps.indexOf(nextStep);
      state.steps.splice(globalIdx, 1);
      state.steps.splice(nextGlobalIdx, 0, step);
      saveData(); render();
    }}, "▼"));
    btns.appendChild(h("button", {className:"btn-edit", title:"Umbenennen", onClick:() => startRenaming("step", step.id)}, "✎"));
    btns.appendChild(h("button", {className:"btn-edit", title:"Duplizieren", onClick:() => duplicateStep(step)}, "⧉"));
    // Add substep
    btns.appendChild(h("button", {className:"btn-edit", title:"Unterschritt hinzufügen", onClick:() => showModal({
      title: "Neuer Unterschritt",
      value: "",
      onConfirm: (val) => { if(val.trim()) { pushUndo(); if(!step.substeps) step.substeps=[]; step.substeps.push({id:"ss_"+uid(), name:val.trim()}); saveData(); render(); } }
    })}, "+"));
    // Section assignment
    if((state.sections||[]).length > 0) {
      const secSelect = h("select", {style:{fontSize:"9px",padding:"1px 2px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"3px",color:"var(--textMuted)",fontFamily:"inherit",cursor:"pointer"},
        onChange:e => { pushUndo(); step.sectionId = e.target.value; saveData(); render(); }
      });
      secSelect.appendChild(h("option", {value:""}, "—"));
      (state.sections||[]).forEach(sec => {
        const opt = h("option", {value:sec.id}, sec.name);
        if(step.sectionId === sec.id) opt.selected = true;
        secSelect.appendChild(opt);
      });
      btns.appendChild(secSelect);
    }
    // Delete
    btns.appendChild(h("button", {className:"btn-edit danger", onClick:() => {
      if (hasSubs) {
        confirmDelete(
          "Hauptschritt löschen?",
          "\"" + step.name + "\" enthält " + step.substeps.length + " Unterschritt(e). Alles wird gelöscht.",
          () => {
            pushUndo();
            state.steps = state.steps.filter(s => s.id !== step.id);
            saveData(); render();
          }
        );
      } else {
        pushUndo();
        state.steps = state.steps.filter(s => s.id !== step.id);
        saveData(); render();
      }
    }}, "✕"));
    nameDiv.appendChild(btns);
  }
  tdName.appendChild(nameDiv);
  tr.appendChild(tdName);

  // Cells for main step
  state.constructions.forEach(con => {
    if(hasSubs) {
      const cells = step.substeps.map(ss => getCell(con.id, ss.id));
      const st = cells.every(c => c.status==="done") ? "done"
        : cells.some(c => c.status==="blocked") ? "blocked"
        : cells.some(c => c.status==="active") ? "active"
        : cells.some(c => c.status==="review") ? "review"
        : cells.some(c => c.status==="kommt") ? "kommt"
        : "none";
      tr.appendChild(h("td", {className:"cell-main"}, st !== "none" ? h("span", {className:"dot "+st}) : document.createTextNode("")));
    } else {
      tr.appendChild(renderCell(con.id, step.id));
    }
  });
  if(state.editMode) tr.appendChild(h("td", null));
  tbody.appendChild(tr);

  // Substep rows
  if(hasSubs && !isCollapsed) {
    step.substeps.forEach((sub, ssi) => {
      const str = h("tr", null);
      const stdName = h("td", {className:"step-sub indent-sub"});
      const sdiv = h("div", {style:{display:"flex",alignItems:"center",gap:"3px"}});
      sdiv.appendChild(h("span", {className:"sub-arrow"}, "└"));

      if(state.editMode) {
        if (state.renaming && state.renaming.type === "substep" && state.renaming.id === sub.id) {
          sdiv.appendChild(renderRenameInput(sub.id, sub.name));
        } else {
          sdiv.appendChild(h("span", {style:{flex:"1",cursor:"pointer"}, onClick:() => startRenaming("substep", sub.id, step.id)}, sub.name));
          const sbtns = h("span", {style:{display:"flex",gap:"1px",flexShrink:"0"}});
          if(ssi > 0) sbtns.appendChild(h("button", {className:"btn-edit", onClick:() => {
            pushUndo();
            [step.substeps[ssi], step.substeps[ssi-1]] = [step.substeps[ssi-1], step.substeps[ssi]];
            saveData(); render();
          }}, "▲"));
          if(ssi < step.substeps.length-1) sbtns.appendChild(h("button", {className:"btn-edit", onClick:() => {
            pushUndo();
            [step.substeps[ssi], step.substeps[ssi+1]] = [step.substeps[ssi+1], step.substeps[ssi]];
            saveData(); render();
          }}, "▼"));
          sbtns.appendChild(h("button", {className:"btn-edit", title:"Umbenennen", onClick:() => startRenaming("substep", sub.id, step.id)}, "✎"));
          sbtns.appendChild(h("button", {className:"btn-edit", title:"Duplizieren", onClick:() => duplicateSubstep(step, sub)}, "⧉"));
          sbtns.appendChild(h("button", {className:"btn-edit danger", onClick:() => {
            pushUndo();
            step.substeps = step.substeps.filter(ss => ss.id !== sub.id);
            saveData(); render();
          }}, "✕"));
          sdiv.appendChild(sbtns);
        }
      } else {
        sdiv.appendChild(h("span", {style:{flex:"1"}}, sub.name));
      }
      stdName.appendChild(sdiv);
      str.appendChild(stdName);

      state.constructions.forEach(con => {
        str.appendChild(renderCell(con.id, sub.id));
      });
      if(state.editMode) str.appendChild(h("td", null));
      tbody.appendChild(str);
    });
  }
}

function renderCell(cid, sid) {
  const cell = getCell(cid, sid);
  const cellKey = ck(cid, sid);
  const td = h("td", {className:"cell", onClick: e => {
    e.stopPropagation();
    state.activeCell = state.activeCell === cellKey ? null : cellKey;
    render();
  }});

  const chipEl = renderChip(cell);
  td.appendChild(chipEl);

  if(state.activeCell === cellKey) {
    td.appendChild(renderPopup(cid, sid, cell));
  }

  return td;
}

function renderChip(cell) {
  if(cell.status==="none") return h("span", {style:{color:"var(--none-text)"}}, "·");
  return h("span", {className:"chip "+cell.status}, cell.person || STATUS_LABELS[cell.status]);
}

function renderPopup(cid, sid, cell) {
  const pop = h("div", {className:"popup", onClick:e => e.stopPropagation()});

  // STATUS
  pop.appendChild(h("div", {className:"popup-label"}, "STATUS"));
  const sg = h("div", {style:{marginBottom:"8px"}});
  Object.entries(STATUS_LABELS).forEach(([k,v]) => {
    const btn = h("button", {
      className:"popup-btn"+(cell.status===k?" selected":""),
      style:{color:"var(--"+k+"-text)", background:cell.status===k?"var(--"+k+"-bg)":"transparent", borderColor:cell.status===k?"var(--"+k+"-border)":"var(--border)"},
      onClick:() => setCell(cid, sid, {...cell, status:k})
    }, v);
    sg.appendChild(btn);
  });
  pop.appendChild(sg);

  // PERSON
  pop.appendChild(h("div", {className:"popup-label"}, "PERSON"));
  const suggested = getSuggestedPerson(sid, cid);
  const pg = h("div", {style:{display:"flex",flexWrap:"wrap",gap:"3px"}});
  pg.appendChild(h("button", {className:"popup-person"+(!cell.person?" selected":""), onClick:() => setCell(cid, sid, {...cell, person:""})}, "—"));
  state.team.forEach(t => {
    const isSuggested = (t === suggested && !cell.person);
    const cls = "popup-person" + (cell.person===t ? " selected" : "") + (isSuggested ? " suggested" : "");
    const btn = h("button", {className:cls, onClick:() => setCell(cid, sid, {...cell, person:t})}, t);
    if(isSuggested) btn.title = "Vorschlag: In anderen Konstruktionen zugewiesen";
    pg.appendChild(btn);
  });
  pop.appendChild(pg);

  if(suggested && !cell.person) {
    pop.appendChild(h("div", {style:{fontSize:"9px",color:"var(--review-text)",marginTop:"4px"}}, "💡 Vorschlag: " + suggested));
  }

  return pop;
}

// ─── Dashboard ───
function renderDashboard() {
  const frag = document.createDocumentFragment();
  frag.appendChild(h("h2", {className:"section-title"}, "Projekt-Übersicht"));
  const grid = h("div", {className:"card-grid", style:{marginBottom:"28px"}});
  state.constructions.forEach(con => {
    const p = getProgress(con.id);
    const card = h("div", {className:"card"},
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
        h("span", {style:{fontWeight:"700",fontSize:"14px",color:"var(--textStrong)"}}, con.name),
        h("span", {style:{fontSize:"20px",fontWeight:"800",color:p.pct===100?"var(--done-text)":"var(--active-text)"}}, p.pct+"%")
      ),
      h("div", {className:"progress-bar"}, h("div", {className:"progress-fill", style:{width:p.pct+"%",background:p.pct===100?"var(--done-text)":p.pct>50?"var(--active-text)":"var(--review-text)"}}))
    );
    const stats = h("div", {style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"12px",fontSize:"11px"}});
    [["Erledigt",p.done,"done"],["In Arbeit",p.active,"active"],["Blockiert",p.blocked,"blocked"],["Review",p.review,"review"]].forEach(([l,v,k]) => {
      stats.appendChild(h("div", {style:{display:"flex",justifyContent:"space-between"}},
        h("span", {style:{color:"var(--textMuted)"}}, l),
        h("span", {style:{color:"var(--"+k+"-text)",fontWeight:"600"}}, v+"/"+p.total)
      ));
    });
    card.appendChild(stats);
    grid.appendChild(card);
  });
  frag.appendChild(grid);

  frag.appendChild(h("h2", {className:"section-title"}, "Nächste Schritte"));
  const nexts = [];
  state.constructions.forEach(con => {
    getAllIds(state.steps).forEach(sid => {
      const c = getCell(con.id, sid);
      if(["active","blocked","review"].includes(c.status)) {
        nexts.push({con:con.name, step:findName(sid), status:c.status, person:c.person});
      }
    });
  });
  if(!nexts.length) frag.appendChild(h("div", {style:{color:"var(--textMuted)",padding:"14px"}}, "Keine offenen Aufgaben."));
  else nexts.forEach(ns => {
    const row = h("div", {className:"next-row"},
      h("span", {className:"dot "+ns.status}),
      h("span", {style:{fontWeight:"600",color:"var(--textStrong)",minWidth:"70px"}}, ns.con),
      h("span", {style:{color:"var(--textMuted)",flex:"1"}}, ns.step)
    );
    if(ns.person) row.appendChild(h("span", {style:{padding:"2px 7px",background:"var(--accent)",border:"1px solid var(--borderStrong)",borderRadius:"4px",fontSize:"10px"}}, ns.person));
    row.appendChild(h("span", {style:{fontSize:"10px",color:"var(--"+ns.status+"-text)"}}, STATUS_LABELS[ns.status]));
    frag.appendChild(row);
  });
  return frag;
}

// ─── Tasks ───
function renderTasks() {
  const frag = document.createDocumentFragment();
  frag.appendChild(h("h2", {className:"section-title"}, "Aufgaben pro Person"));

  const tasks = {};
  const unassigned = [];
  state.team.forEach(p => tasks[p] = []);

  state.constructions.forEach(con => {
    getAllIds(state.steps).forEach(sid => {
      const c = getCell(con.id, sid);
      // Exclude "done", "none", and "kommt" from tasks
      if(["done","none","kommt"].includes(c.status)) return;
      if(c.person) {
        if(!tasks[c.person]) tasks[c.person] = [];
        tasks[c.person].push({con:con.name, step:findName(sid), status:c.status});
      } else {
        unassigned.push({con:con.name, step:findName(sid), status:c.status});
      }
    });
  });

  const grid = h("div", {className:"card-grid"});

  // Unassigned card
  if(unassigned.length > 0) {
    const card = h("div", {className:"card", style:{borderColor:"var(--blocked-border)"}},
      h("div", {style:{fontWeight:"700",fontSize:"13px",color:"var(--blocked-text)",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span", null, "Nicht zugewiesen"),
        h("span", {style:{fontSize:"10px",padding:"2px 7px",background:"var(--blocked-bg)",borderRadius:"10px",color:"var(--blocked-text)"}}, unassigned.length + " offen")
      )
    );
    const list = h("div", {style:{display:"grid",gap:"5px"}});
    unassigned.forEach(t => {
      list.appendChild(h("div", {style:{padding:"7px 9px",background:"var(--bg)",borderRadius:"4px",border:"1px solid var(--"+t.status+"-border)",display:"flex",alignItems:"center",gap:"7px"}},
        h("span", {className:"dot "+t.status}),
        h("div", null,
          h("div", {style:{fontSize:"11px",fontWeight:"600",color:"var(--text)"}}, t.con),
          h("div", {style:{fontSize:"10px",color:"var(--textMuted)"}}, t.step)
        )
      ));
    });
    card.appendChild(list);
    grid.appendChild(card);
  }

  // Per-person cards
  state.team.forEach(person => {
    const card = h("div", {className:"card"},
      h("div", {style:{fontWeight:"700",fontSize:"13px",color:"var(--textStrong)",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("span", null, person),
        h("span", {style:{fontSize:"10px",padding:"2px 7px",background:"var(--accent)",borderRadius:"10px",color:tasks[person]?.length?"var(--active-text)":"var(--done-text)"}}, (tasks[person]?.length||0)+" offen")
      )
    );
    if(!tasks[person]?.length) card.appendChild(h("div", {style:{color:"var(--textFaint)",fontSize:"11px"}}, "Keine offenen Aufgaben"));
    else {
      const list = h("div", {style:{display:"grid",gap:"5px"}});
      tasks[person].forEach(t => {
        list.appendChild(h("div", {style:{padding:"7px 9px",background:"var(--bg)",borderRadius:"4px",border:"1px solid var(--"+t.status+"-border)",display:"flex",alignItems:"center",gap:"7px"}},
          h("span", {className:"dot "+t.status}),
          h("div", null,
            h("div", {style:{fontSize:"11px",fontWeight:"600",color:"var(--text)"}}, t.con),
            h("div", {style:{fontSize:"10px",color:"var(--textMuted)"}}, t.step)
          )
        ));
      });
      card.appendChild(list);
    }
    grid.appendChild(card);
  });
  frag.appendChild(grid);
  return frag;
}

// Close popup on outside click
document.addEventListener("click", (e) => {
  if(state.activeCell && !e.target.closest(".popup") && !e.target.closest(".cell") && !e.target.closest(".chip")) {
    state.activeCell = null;
    render();
  }
});

// Auth listener
auth.onAuthStateChanged(user => {
  state.user = user;
  if (user) loadData();
  else { if(unsubscribe) unsubscribe(); }
  render();
});
</script>
</body>
</html>
