<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstruktion Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#f4f5f7; --bgCard:#fff; --border:#e0e3e8; --borderStrong:#c8cdd5; --text:#3a4250; --textStrong:#111827; --textMuted:#7b8494; }
  body { font-family: Arial; background: var(--bg); }

  table { border-collapse: collapse; width:100%; }

  /* FIX 1: overflow sichtbar */
  th { padding:10px; border-bottom:1px solid var(--border); overflow: visible; }
  td { padding:5px; border-bottom:1px solid var(--border); overflow: visible; }

  .btn-sm { padding:4px 10px; border:1px solid var(--borderStrong); cursor:pointer; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const state = {
  constructions: [{id:"c1",name:"NM 001"}],
  editMode: true
};

function uid(){ return Math.random().toString(36).slice(2,9); }

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>el.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return el;
}

function makeNameInputWithSuggestion(onConfirm){
  const inp = h("input",{
    onkeydown:e=>{
      if(e.key==="Enter"){
        const v=inp.value.trim();
        if(v){ onConfirm(v); }
      }
    }
  });
  return inp;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  const table=h("table");
  const tr=h("tr");

  state.constructions.forEach(c=>{
    tr.appendChild(h("th",null,c.name));
  });

  // FIX 2: Button statt leerem Feld
  if(state.editMode){
    const addTh = h("th",{style:"text-align:center"});

    const btn = h("button",{
      className:"btn-sm",
      onclick:()=>{
        addTh.innerHTML="";
        const input = makeNameInputWithSuggestion(name=>{
          state.constructions.push({id:"c_"+uid(),name});
          render();
        });
        addTh.appendChild(input);
        input.focus();
      }
    },"+ Konstruktion");

    addTh.appendChild(btn);
    tr.appendChild(addTh);
  }

  table.appendChild(tr);
  app.appendChild(table);
}

render();
</script>

</body>
</html>
