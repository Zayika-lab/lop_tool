<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstruktion Tracker (Fix)</title>
</head>
<body>
<script>
// 🔧 FIX 1: Popup bleibt offen
// Ersetze den bestehenden document click handler durch diesen:

document.addEventListener("click", (e) => {
  if (state.activeCell) {
    const isCell = e.target.closest("td.cell");
    const isPopup = e.target.closest(".popup");

    if (!isCell && !isPopup) {
      state.activeCell = null;
      render();
    }
  }

  if (state.renaming && !e.target.closest(".rename-input") && !e.target.closest(".suggest-list")) {
    state.renaming = null;
    render();
  }
});

// 🔧 FIX 2: Sicherheit für Cell Click
// In renderMatrix -> td cell onClick ersetzen durch:

function safeCellClick(cellKey) {
  state.activeCell = state.activeCell === cellKey ? null : cellKey;
  setTimeout(() => render(), 0);
}

// Beispiel Nutzung:
// onClick: () => safeCellClick(cellKey)

// 🔧 FIX 3: Firebase überschreibt neue Konstruktion nicht sofort
// Ergänze merge beim lokalen Update

function addConstruction(name) {
  const newCon = { id: "c_" + uid(), name };
  state.constructions = [...state.constructions, newCon];
  render();
  saveData();
}

// 🔧 FIX 4: Debug (optional)
function debug() {
  console.log("ACTIVE CELL:", state.activeCell);
  console.log("CONSTRUCTIONS:", state.constructions);
}

</script>
</body>
</html>
