<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstruktion Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7; --bgCard: #ffffff; --border: #e0e3e8; --borderStrong: #c8cdd5;
    --text: #3a4250; --textStrong: #111827; --textMuted: #7b8494; --textFaint: #bfc5ce;
    --accent: #eceef2; --popBg: #ffffff; --shadow: rgba(0,0,0,0.13);
    --done-bg: #dcfce7; --done-border: #86efac; --done-text: #15803d;
    --active-bg: #dbeafe; --active-border: #93c5fd; --active-text: #2563eb;
    --warte-bg: #ede9fe; --warte-border: #c4b5fd; --warte-text: #7c3aed;
    --blocked-bg: #fee2e2; --blocked-border: #fca5a5; --blocked-text: #dc2626;
    --kommt-bg: #f0f1f4; --kommt-border: #c8cdd5; --kommt-text: #7b8494;
    --none-bg: #f0f1f4; --none-border: #dde0e5; --none-text: #a0a8b4;
    --section-bg: #f8f9fb; --section-border: #d4d8e0;
  }
  [data-theme="dark"] {
    --bg: #0d0d1a; --bgCard: #111128; --border: #1e1e3a; --borderStrong: #2a2a5a;
    --text: #c8d6e5; --textStrong: #e2e8f0; --textMuted: #667788; --textFaint: #334455;
    --accent: #1a1a3a; --popBg: #151530; --shadow: rgba(0,0,0,0.5);
    --done-bg: #0d3320; --done-border: #1a6640; --done-text: #4ade80;
    --active-bg: #1e3a5f; --active-border: #3b82f6; --active-text: #60a5fa;
    --warte-bg: #2e1a5e; --warte-border: #6d3fc0; --warte-text: #a78bfa;
    --blocked-bg: #3b1010; --blocked-border: #7a2020; --blocked-text: #f87171;
    --kommt-bg: #1a1a2e; --kommt-border: #2a2a4a; --kommt-text: #556677;
    --none-bg: #1a1a2e; --none-border: #2a2a4a; --none-text: #556677;
    --section-bg: #0f0f24; --section-border: #1e1e3a;
  }

  html { overflow-anchor: none; }
  body { font-family: 'IBM Plex Mono', monospace; font-size: 12px; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .3s, color .3s; }

  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; }
  .login-screen h1 { font-size: 18px; letter-spacing: 3px; text-transform: uppercase; color: var(--textStrong); }
  .login-btn { display: flex; align-items: center; gap: 10px; padding: 12px 28px; background: var(--bgCard); border: 1px solid var(--borderStrong); border-radius: 6px; color: var(--textStrong); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all .2s; }
  .login-btn:hover { background: var(--accent); }

  .header { background: var(--bgCard); border-bottom: 1px solid var(--border); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--textStrong); text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .header-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--done-text); box-shadow: 0 0 6px var(--done-text); }
  .header-actions { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
  .user-info { display: flex; align-items: center; gap: 8px; margin-right: 8px; font-size: 11px; color: var(--textMuted); }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--borderStrong); }

  .btn { padding: 5px 12px; background: transparent; border: 1px solid transparent; border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; letter-spacing: 1px; }
  .btn.active { background: var(--accent); border-color: var(--borderStrong); color: var(--textStrong); }
  .btn-sm { padding: 4px 10px; background: var(--accent); border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; }
  .btn-sm:hover { background: var(--borderStrong); color: var(--textStrong); }
  .btn-edit { background: none; border: none; color: var(--textMuted); cursor: pointer; font-size: 10px; font-family: inherit; padding: 1px 3px; }
  .btn-edit:hover { color: var(--textStrong); }
  .btn-edit.danger { color: var(--blocked-text); }
  .btn-edit.danger:hover { color: var(--blocked-border); }
  .btn-theme { padding: 4px 10px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 14px; }
  .btn-editmode { padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; }
  .btn-editmode.on { background: var(--blocked-bg); border: 1px solid var(--blocked-border); color: var(--blocked-text); }
  .btn-editmode.off { background: transparent; border: 1px solid var(--borderStrong); color: var(--textMuted); }
  .btn-logout { padding: 5px 12px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 10px; font-family: inherit; }
  .btn-undo { padding: 5px 12px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; transition: all .15s; }
  .btn-undo:hover:not(.is-disabled) { background: var(--accent); color: var(--textStrong); }
  .btn-undo.is-disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  .btn-colvis { padding: 4px 10px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textMuted); cursor: pointer; font-size: 11px; font-family: inherit; position: relative; }
  .btn-colvis:hover { background: var(--accent); color: var(--textStrong); }
  .colvis-menu { position: absolute; top: 100%; right: 0; background: var(--popBg); border: 1px solid var(--borderStrong); border-radius: 6px; padding: 8px; z-index: 500; min-width: 160px; box-shadow: 0 8px 28px var(--shadow); margin-top: 4px; }
  .colvis-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; cursor: pointer; font-size: 11px; border-radius: 3px; color: var(--text); }
  .colvis-item:hover { background: var(--accent); }
  .colvis-check { width: 14px; height: 14px; border: 1px solid var(--borderStrong); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; background: var(--bg); flex-shrink: 0; }
  .colvis-check.on { background: var(--done-bg); border-color: var(--done-border); color: var(--done-text); }
  .divider { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  .content { padding: 14px 18px; }
  .legend { display: flex; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 11px; height: 11px; border-radius: 2px; }
  .table-wrap { overflow-x: auto; position: relative; padding-right: 20px; }
  table { border-collapse: collapse; min-width: 600px; }
  th { padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--textMuted); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; text-align: left; }
  th.left { text-align: left; min-width: 220px; }
  td { padding: 5px 10px; border-bottom: 1px solid var(--border); font-size: 12px; text-align: left; }
  td.step-main { font-weight: 700; color: var(--textStrong); background: var(--bgCard); }
  td.step-sub { color: var(--textMuted); font-size: 11px; }
  td.cell { text-align: left; position: relative; cursor: pointer; vertical-align: top; }
  td.cell-main { text-align: left; background: var(--bgCard); }

  .indent-section { padding-left: 8px !important; }
  .indent-main { padding-left: 26px !important; }
  .indent-sub { padding-left: 46px !important; }

  tr.section-row td { background: var(--section-bg); border-bottom: 2px solid var(--section-border); padding: 8px 12px; }
  tr.section-row td.section-cell { text-align: left; vertical-align: middle; padding: 8px 4px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--textMuted); display: flex; align-items: center; gap: 6px; }

  .collapse-toggle { background: none; border: none; cursor: pointer; color: var(--textMuted); font-size: 10px; font-family: inherit; padding: 2px 4px; transition: transform .2s; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 3px; }
  .collapse-toggle:hover { background: var(--accent); color: var(--textStrong); }
  .collapse-toggle.collapsed { transform: rotate(-90deg); }

  .chip { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .chip.done { background: var(--done-bg); border: 1px solid var(--done-border); color: var(--done-text); }
  .chip.active { background: var(--active-bg); border: 1px solid var(--active-border); color: var(--active-text); }
  .chip.warte { background: var(--warte-bg); border: 1px solid var(--warte-border); color: var(--warte-text); }
  .chip.blocked { background: var(--blocked-bg); border: 1px solid var(--blocked-border); color: var(--blocked-text); }
  .chip.kommt { background: var(--kommt-bg); border: 1px solid var(--kommt-border); color: var(--kommt-text); }

  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot.done { background: var(--done-text); }
  .dot.active { background: var(--active-text); }
  .dot.warte { background: var(--warte-text); }
  .dot.blocked { background: var(--blocked-text); }
  .dot.kommt { background: var(--kommt-text); }

  .popup-fixed { position: fixed; background: var(--popBg); border: 1px solid var(--borderStrong); border-radius: 8px; padding: 10px; z-index: 9999; min-width: 190px; box-shadow: 0 8px 28px var(--shadow); }
  .popup-label { font-size: 9px; color: var(--textMuted); letter-spacing: 1px; margin-bottom: 5px; }
  .popup-btn { display: block; width: 100%; padding: 4px 8px; background: transparent; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; text-align: left; margin-bottom: 2px; }
  .popup-btn.selected { border-color: var(--borderStrong); }
  .popup-person { padding: 2px 7px; background: transparent; border: 1px solid var(--borderStrong); border-radius: 3px; cursor: pointer; font-size: 10px; font-family: inherit; }
  .popup-person.selected { background: var(--accent); color: var(--textStrong); }
  .popup-person.suggested { border-color: var(--active-border); background: var(--active-bg); color: var(--active-text); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--popBg); border: 1px solid var(--borderStrong); border-radius: 8px; padding: 24px; min-width: 280px; max-width: 400px; box-shadow: 0 12px 40px var(--shadow); }
  .modal h3 { margin-bottom: 10px; font-weight: 600; color: var(--textStrong); font-size: 13px; }
  .modal p { font-size: 11px; color: var(--textMuted); margin-bottom: 10px; }
  .modal .hint { font-size: 9px; color: var(--textFaint); margin-top: 6px; }
  input.field { padding: 5px 8px; background: var(--bg); border: 1px solid var(--borderStrong); border-radius: 4px; color: var(--textStrong); font-size: 11px; font-family: inherit; outline: none; width: 100%; }
  input.field:focus { border-color: var(--active-border); box-shadow: 0 0 0 2px var(--active-bg); }
  .modal-actions { display: flex; gap: 6px; margin-top: 12px; justify-content: flex-end; }
  .modal-btn { padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 11px; font-family: inherit; border: 1px solid var(--borderStrong); background: var(--accent); color: var(--textStrong); }
  .modal-btn.primary { background: var(--done-bg); border-color: var(--done-border); color: var(--done-text); }
  .modal-btn.danger { background: var(--blocked-bg); border-color: var(--blocked-border); color: var(--blocked-text); }

  .progress-bar { height: 5px; background: var(--accent); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .mini-bar { display: flex; align-items: center; gap: 5px; }
  .mini-track { height: 3px; width: 44px; background: var(--accent); border-radius: 2px; overflow: hidden; }

  .section-title { font-size: 13px; font-weight: 700; color: var(--textStrong); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .card { background: var(--bgCard); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
  .next-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(--bgCard); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 5px; }

  .team-bar { margin-top: 16px; padding: 12px; background: var(--bgCard); border-radius: 6px; border: 1px solid var(--border); }
  .team-tag { padding: 3px 8px; background: var(--accent); border: 1px solid var(--borderStrong); border-radius: 4px; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; }

  .save-indicator { position: fixed; bottom: 16px; right: 16px; padding: 6px 14px; background: var(--done-bg); border: 1px solid var(--done-border); color: var(--done-text); border-radius: 6px; font-size: 11px; font-family: inherit; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; }
  .save-indicator.show { opacity: 1; }

  .repeat-badge { font-size: 8px; color: var(--active-text); border: 1px solid var(--active-border); border-radius: 2px; padding: 0 3px; line-height: 14px; }
  .sub-arrow { color: var(--textFaint); margin-right: 3px; }
  .scroll-spacer { pointer-events: none; }

  .add-section-btn { background: none; border: 1px dashed var(--borderStrong); color: var(--textFaint); cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 3px; font-family: inherit; margin-left: 6px; }
  .add-section-btn:hover { color: var(--textStrong); border-color: var(--textMuted); }
  .add-step-btn { background: none; border: 1px dashed var(--borderStrong); color: var(--textFaint); cursor: pointer; font-size: 9px; padding: 1px 6px; border-radius: 3px; font-family: inherit; }
  .add-step-btn:hover { color: var(--textStrong); border-color: var(--textMuted); }

  .edit-btns { display: flex; gap: 1px; flex-shrink: 0; align-items: center; }

  @media (max-width: 640px) {
    .header { padding: 10px 12px; }
    .content { padding: 10px 12px; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDrLP5LF4OmjAkyn6O0o8d6bLqu0VqtDfs",authDomain:"lop-tool.firebaseapp.com",projectId:"lop-tool",storageBucket:"lop-tool.firebasestorage.app",messagingSenderId:"137174368951",appId:"1:137174368951:web:1bdf9e3d7100789f9f4332"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore(),provider=new firebase.auth.GoogleAuthProvider();
const STATUS_LABELS={none:"—",done:"Erledigt",active:"In Arbeit",warte:"Warte",blocked:"Blockiert",kommt:"Kommt"};
const uid=()=>Math.random().toString(36).slice(2,9);
const DEFAULT_STEPS=[
  {id:"s1",name:"CAD-Anpassungen",repeatable:false,sectionId:"sec1",substeps:[{id:"s1a",name:"Modell"},{id:"s1b",name:"Zeichnung"}]},
  {id:"s2",name:"Toleranz-Analyse",repeatable:false,sectionId:"sec1",substeps:[{id:"s2a",name:"Skizzen-Modell"},{id:"s2b",name:"Skizzen-Zeichnung"},{id:"s2c",name:"Toleranz-Berechnung"},{id:"s2d",name:"Toleranz-Auswertung"}]},
  {id:"s3",name:"CAD-Daten-Erstellung",repeatable:false,sectionId:"sec1",substeps:[{id:"s3a",name:"Anforderungen-Übernahme"},{id:"s3b",name:"Toleranz-Übernahme"},{id:"s3c",name:"Kollisions-Prüfung"},{id:"s3d",name:"Modell-Bemaßung"},{id:"s3e",name:"Prüfmaße"}]},
  {id:"s4",name:"SAP-Pflege",repeatable:false,sectionId:"sec2",substeps:[{id:"s4a",name:"Teile-Guss"},{id:"s4b",name:"Teile-Fräs"},{id:"s4c",name:"Teile-Verbindung"},{id:"s4d",name:"Teile-Dichtung"}]},
  {id:"s5",name:"CAD-Daten-Ablage",repeatable:false,sectionId:"sec2",substeps:[]},
  {id:"s6",name:"3D-Druck/Prüfung",repeatable:true,sectionId:"sec3",substeps:[{id:"s6a",name:"Daten-Abgabe"},{id:"s6b",name:"Druck-Erfolgreich"},{id:"s6c",name:"Bearbeitung-Erfolgreich"},{id:"s6d",name:"Druck-Verbaut/Analysiert"}]},
  {id:"s7",name:"Prüfzeichnungen",repeatable:false,sectionId:"sec3",substeps:[{id:"s7a",name:"Daten-Abgabe"},{id:"s7b",name:"Prüfzeichnungen-Erstellt"}]},
  {id:"s8",name:"Lieferung",repeatable:false,sectionId:"sec3",substeps:[{id:"s8a",name:"Anfrage / Daten-Abgabe"},{id:"s8b",name:"RM-Erhalt"},{id:"s8c",name:"RM-Bearbeitet"},{id:"s8d",name:"Bestellung / Daten-Abgabe"}]},
];
const DEFAULT_SECTIONS=[{id:"sec1",name:"Konstruktion"},{id:"sec2",name:"Datenpflege"},{id:"sec3",name:"Fertigung & Lieferung"}];
const DEFAULT_CONSTRUCTIONS=[{id:"c1",name:"NM 045"},{id:"c2",name:"NM 011"},{id:"c3",name:"NM 021"},{id:"c4",name:"NM 031"}];
const DEFAULT_TEAM=["OZ","REV","Wladi","Sabrina"];

let state={user:null,steps:DEFAULT_STEPS,sections:DEFAULT_SECTIONS,constructions:DEFAULT_CONSTRUCTIONS,team:DEFAULT_TEAM,matrix:{},view:"matrix",theme:"light",editMode:false,activeCell:null,collapsed:{},collapsedSections:{},saving:false,showSaved:false,modal:null,hiddenColumns:{},showColVisMenu:false};
let saveTimeout=null,unsubscribe=null,pendingSave=false;

// ─── Undo ───
const MAX_UNDO=10;
let undoStack=[];
function pushUndo(){undoStack.push(JSON.stringify({steps:state.steps,sections:state.sections,constructions:state.constructions,team:state.team,matrix:state.matrix}));if(undoStack.length>MAX_UNDO)undoStack.shift();}
function performUndo(){if(!undoStack.length)return;const s=JSON.parse(undoStack.pop());state.steps=s.steps;state.sections=s.sections;state.constructions=s.constructions;state.team=s.team;state.matrix=s.matrix;saveData();render();}
document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!e.target.closest("input,textarea,select")){e.preventDefault();performUndo();}});

// ─── Firebase ───
function docRef(){return db.collection("tracker").doc("shared");}
function loadData(){
  if(unsubscribe)unsubscribe();
  unsubscribe=docRef().onSnapshot(snap=>{
    if(pendingSave)return;
    if(snap.exists){
      const d=snap.data();
      if(d.steps){state.steps=d.steps;state.steps.forEach(s=>{if(!s.sectionId)s.sectionId="sec_unsorted";});}
      if(d.sections)state.sections=d.sections;
      if(d.constructions)state.constructions=d.constructions;
      if(d.team)state.team=d.team;
      if(d.matrix)state.matrix=d.matrix;
      // Migrate: remove review status from matrix
      Object.keys(state.matrix).forEach(k=>{
        if(state.matrix[k]&&state.matrix[k].status==="review")state.matrix[k].status="none";
      });
      render();
    }
  });
}
function saveData(){
  clearTimeout(saveTimeout);pendingSave=true;
  saveTimeout=setTimeout(async()=>{
    state.saving=true;render();
    try{await docRef().set({steps:state.steps,sections:state.sections||[],constructions:state.constructions,team:state.team,matrix:state.matrix,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:state.user?.displayName||"unknown"});}catch(e){console.error("Save error:",e);}
    pendingSave=false;state.saving=false;state.showSaved=true;render();
    setTimeout(()=>{state.showSaved=false;render();},1500);
  },500);
}

// ─── Cell Helpers ───
function ck(cid,sid){return cid+"::"+sid;}
function getCell(cid,sid){return state.matrix[ck(cid,sid)]||{status:"none",person:""};}
function setCell(cid,sid,data){
  pushUndo();
  // Auto-assign suggested person if status is set and no person chosen
  if(data.status!=="none"&&!data.person){
    const sugg=getSuggestedPerson(sid,cid);
    if(sugg)data.person=sugg;
  }
  state.matrix[ck(cid,sid)]=data;
  state.activeCell=null;
  saveData();render();
}
function getAllIds(steps){const ids=[];steps.forEach(s=>{ids.push(s.id);(s.substeps||[]).forEach(ss=>ids.push(ss.id));});return ids;}

function getProgress(cid){
  const ids=getAllIds(state.steps);if(!ids.length)return{done:0,active:0,warte:0,blocked:0,kommt:0,pct:0,total:0};
  let d=0,a=0,w=0,b=0,k=0,counted=0;
  ids.forEach(sid=>{const c=getCell(cid,sid);if(c.status==="none")return;counted++;if(c.status==="done")d++;if(c.status==="active")a++;if(c.status==="warte")w++;if(c.status==="blocked")b++;if(c.status==="kommt")k++;});
  return{done:d,active:a,warte:w,blocked:b,kommt:k,pct:counted?Math.round(d/counted*100):0,total:counted};
}

function getSectionStatus(sectionId,cid){
  const ss=state.steps.filter(s=>s.sectionId===sectionId);if(!ss.length)return"none";
  const st=new Set();
  ss.forEach(step=>{[step.id,...(step.substeps||[]).map(x=>x.id)].forEach(sid=>{const c=getCell(cid,sid);if(c.status!=="none")st.add(c.status);});});
  if(!st.size)return"none";
  if(st.size===1&&st.has("done"))return"done";
  if(st.has("blocked"))return"blocked";
  if(st.has("warte"))return"warte";
  if(st.has("active"))return"active";
  return"kommt";
}

// Summary status for main step with substeps
function getMainStepSummary(step,cid){
  if(!step.substeps||!step.substeps.length)return"none";
  const cells=step.substeps.map(ss=>getCell(cid,ss.id));
  const statuses=cells.map(c=>c.status);
  // All done → green
  if(statuses.every(s=>s==="done"))return"done";
  // Any blocked → red
  if(statuses.some(s=>s==="blocked"))return"blocked";
  // Any warte → violet
  if(statuses.some(s=>s==="warte"))return"warte";
  // Any active → blue
  if(statuses.some(s=>s==="active"))return"active";
  // Otherwise gray
  return"kommt";
}

function findName(sid){for(const s of state.steps){if(s.id===sid)return s.name;for(const ss of(s.substeps||[]))if(ss.id===sid)return s.name+" → "+ss.name;}return sid;}
function getSuggestedPerson(sid,currentCid){const p={};state.constructions.forEach(con=>{if(con.id===currentCid)return;const c=getCell(con.id,sid);if(c.person)p[c.person]=(p[c.person]||0)+1;});let best=null,bc=0;Object.entries(p).forEach(([k,v])=>{if(v>bc){best=k;bc=v;}});return best;}

// ─── Duplication ───
function cloneStep(step,secId){return{id:"s_"+uid(),name:step.name+" (Kopie)",repeatable:step.repeatable,sectionId:secId,substeps:(step.substeps||[]).map(ss=>({id:"ss_"+uid(),name:ss.name}))};}
function duplicateSection(sec){pushUndo();const nid="sec_"+uid();const idx=state.sections.indexOf(sec);state.sections.splice(idx+1,0,{id:nid,name:sec.name+" (Kopie)"});const ss=state.steps.filter(s=>s.sectionId===sec.id);let ins=ss.length?state.steps.indexOf(ss[ss.length-1])+1:state.steps.length;ss.forEach(s=>{state.steps.splice(ins++,0,cloneStep(s,nid));});saveData();render();}
function duplicateStep(step){pushUndo();const idx=state.steps.indexOf(step);state.steps.splice(idx+1,0,cloneStep(step,step.sectionId));saveData();render();}
function duplicateSubstep(step,sub){pushUndo();const idx=step.substeps.indexOf(sub);step.substeps.splice(idx+1,0,{id:"ss_"+uid(),name:sub.name+" (Kopie)"});saveData();render();}

function confirmDelete(title,desc,fn){state.modal={type:"confirm",title,description:desc,onConfirm:fn};render();}

// ─── DOM ───
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(v===null||v===undefined||v===false)return;if(k==="className")el.className=v;else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else el.setAttribute(k,v);});
  children.flat(9).forEach(c=>{if(c==null)return;el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}

// ─── Render ───
function render(){
  const scrollY=window.scrollY;
  // Always remove fixed popup before re-render
  const oldPop=document.getElementById("status-popup");
  if(oldPop)oldPop.remove();
  document.body.setAttribute("data-theme",state.theme);
  const app=document.getElementById("app");
  app.innerHTML="";
  if(!state.user){app.appendChild(renderLogin());return;}
  app.appendChild(renderHeader());
  const content=h("div",{className:"content"});
  if(state.view==="matrix")content.appendChild(renderMatrix());
  else if(state.view==="dashboard")content.appendChild(renderDashboard());
  else if(state.view==="tasks")content.appendChild(renderTasks());
  app.appendChild(content);
  if(state.view==="matrix")content.appendChild(h("div",{className:"scroll-spacer",style:{height:Math.max(0,window.innerHeight-100)+"px"}}));
  app.appendChild(h("div",{className:"save-indicator"+(state.showSaved?" show":"")}, "✓ Gespeichert"));
  if(state.modal)app.appendChild(renderModal());
  // Restore scroll synchronously
  window.scrollTo(0,scrollY);
}

  // Remove existing popup
  const old=document.getElementById("status-popup");
  if(old)old.remove();

  const td=document.querySelector('[data-cellkey="'+cellKey+'"]');
  if(!td)return;

  const rect=td.getBoundingClientRect();
  const pop=h("div",{className:"popup-fixed",id:"status-popup",onClick:e=>e.stopPropagation()});

  pop.appendChild(h("div",{className:"popup-label"},"STATUS"));
  const sg=h("div",{style:{marginBottom:"8px"}});
  Object.entries(STATUS_LABELS).forEach(([k,v])=>{sg.appendChild(h("button",{className:"popup-btn"+(cell.status===k?" selected":""),style:{color:"var(--"+k+"-text)",background:cell.status===k?"var(--"+k+"-bg)":"transparent",borderColor:cell.status===k?"var(--"+k+"-border)":"var(--border)"},onClick:()=>{setCell(cid,sid,{...cell,status:k});}},v));});
  pop.appendChild(sg);

  pop.appendChild(h("div",{className:"popup-label"},"PERSON"));
  const sugg=getSuggestedPerson(sid,cid);
  const pg=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"3px"}});
  pg.appendChild(h("button",{className:"popup-person"+(!cell.person?" selected":""),onClick:()=>setCell(cid,sid,{...cell,person:""})},"—"));
  state.team.forEach(t=>{const isSugg=t===sugg&&!cell.person;pg.appendChild(h("button",{className:"popup-person"+(cell.person===t?" selected":"")+(isSugg?" suggested":""),title:isSugg?"Vorschlag":"",onClick:()=>setCell(cid,sid,{...cell,person:t})},t));});
  pop.appendChild(pg);
  if(sugg&&!cell.person)pop.appendChild(h("div",{style:{fontSize:"9px",color:"var(--active-text)",marginTop:"4px"}},"💡 Vorschlag: "+sugg));

  document.body.appendChild(pop);

  // Position: prefer below, flip above if near bottom
  const popH=pop.offsetHeight;
  const spaceBelow=window.innerHeight-rect.bottom;
  const spaceAbove=rect.top;
  let top,left;

  if(spaceBelow>=popH+8||spaceBelow>=spaceAbove){
    top=rect.bottom+4;
  }else{
    top=rect.top-popH-4;
  }
  left=rect.left+rect.width/2-pop.offsetWidth/2;
  // Clamp to viewport
  left=Math.max(8,Math.min(left,window.innerWidth-pop.offsetWidth-8));
  top=Math.max(8,Math.min(top,window.innerHeight-popH-8));

  pop.style.top=top+"px";
  pop.style.left=left+"px";
}

// ─── Dashboard ───
function renderDashboard(){
  const frag=document.createDocumentFragment();
  frag.appendChild(h("h2",{className:"section-title"},"Projekt-Übersicht"));
  const grid=h("div",{className:"card-grid",style:{marginBottom:"28px"}});
  state.constructions.forEach(con=>{
    const p=getProgress(con.id);
    const card=h("div",{className:"card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},h("span",{style:{fontWeight:"700",fontSize:"14px",color:"var(--textStrong)"}},con.name),h("span",{style:{fontSize:"20px",fontWeight:"800",color:p.pct===100?"var(--done-text)":"var(--active-text)"}},p.pct+"%")),
      h("div",{className:"progress-bar"},h("div",{className:"progress-fill",style:{width:p.pct+"%",background:p.pct===100?"var(--done-text)":p.pct>50?"var(--active-text)":"var(--blocked-text)"}})));
    const stats=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginTop:"12px",fontSize:"11px"}});
    [["Erledigt",p.done,"done"],["In Arbeit",p.active,"active"],["Warte",p.warte,"warte"],["Blockiert",p.blocked,"blocked"]].forEach(([l,v,k])=>{stats.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between"}},h("span",{style:{color:"var(--textMuted)"}},l),h("span",{style:{color:"var(--"+k+"-text)",fontWeight:"600"}},v+"/"+p.total)));;});
    card.appendChild(stats);grid.appendChild(card);
  });
  frag.appendChild(grid);
  frag.appendChild(h("h2",{className:"section-title"},"Nächste Schritte"));
  const nexts=[];
  state.constructions.forEach(con=>{getAllIds(state.steps).forEach(sid=>{const c=getCell(con.id,sid);if(["active","warte","blocked"].includes(c.status))nexts.push({con:con.name,step:findName(sid),status:c.status,person:c.person});});});
  if(!nexts.length)frag.appendChild(h("div",{style:{color:"var(--textMuted)",padding:"14px"}},"Keine offenen Aufgaben."));
  else nexts.forEach(ns=>{
    const row=h("div",{className:"next-row"},h("span",{className:"dot "+ns.status}),h("span",{style:{fontWeight:"600",color:"var(--textStrong)",minWidth:"70px"}},ns.con),h("span",{style:{color:"var(--textMuted)",flex:"1"}},ns.step));
    if(ns.person)row.appendChild(h("span",{style:{padding:"2px 7px",background:"var(--accent)",border:"1px solid var(--borderStrong)",borderRadius:"4px",fontSize:"10px"}},ns.person));
    row.appendChild(h("span",{style:{fontSize:"10px",color:"var(--"+ns.status+"-text)"}},STATUS_LABELS[ns.status]));frag.appendChild(row);
  });
  return frag;
}

// ─── Tasks ───
function renderTasks(){
  const frag=document.createDocumentFragment();
  frag.appendChild(h("h2",{className:"section-title"},"Aufgaben pro Person"));
  // Build ordered list of all step/substep IDs (top to bottom)
  const orderedIds=getAllIds(state.steps);
  const idOrder={};orderedIds.forEach((id,i)=>idOrder[id]=i);
  const conOrder={};state.constructions.forEach((c,i)=>conOrder[c.id]=i);
  // Collect tasks
  const tasks={},unassigned=[];state.team.forEach(p=>tasks[p]=[]);
  // Iterate steps first (top-bottom), then constructions (left-right) for correct order
  orderedIds.forEach(sid=>{
    state.constructions.forEach(con=>{
      const c=getCell(con.id,sid);
      if(["done","none","kommt"].includes(c.status))return;
      const entry={con:con.name,step:findName(sid),status:c.status,sidIdx:idOrder[sid]||0,cidIdx:conOrder[con.id]||0};
      if(c.person){if(!tasks[c.person])tasks[c.person]=[];tasks[c.person].push(entry);}
      else unassigned.push(entry);
    });
  });
  const grid=h("div",{className:"card-grid"});
  if(unassigned.length){
    const card=h("div",{className:"card",style:{borderColor:"var(--blocked-border)"}},h("div",{style:{fontWeight:"700",fontSize:"13px",color:"var(--blocked-text)",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}},h("span",null,"Nicht zugewiesen"),h("span",{style:{fontSize:"10px",padding:"2px 7px",background:"var(--blocked-bg)",borderRadius:"10px",color:"var(--blocked-text)"}},unassigned.length+" offen")));
    const list=h("div",{style:{display:"grid",gap:"5px"}});
    unassigned.forEach(t=>list.appendChild(h("div",{style:{padding:"7px 9px",background:"var(--bg)",borderRadius:"4px",border:"1px solid var(--"+t.status+"-border)",display:"flex",alignItems:"center",gap:"7px"}},h("span",{className:"dot "+t.status}),h("div",null,h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text)"}},t.con),h("div",{style:{fontSize:"10px",color:"var(--textMuted)"}},t.step)))));
    card.appendChild(list);grid.appendChild(card);
  }
  state.team.forEach(person=>{
    const card=h("div",{className:"card"},h("div",{style:{fontWeight:"700",fontSize:"13px",color:"var(--textStrong)",marginBottom:"10px",display:"flex",justifyContent:"space-between",alignItems:"center"}},h("span",null,person),h("span",{style:{fontSize:"10px",padding:"2px 7px",background:"var(--accent)",borderRadius:"10px",color:tasks[person]?.length?"var(--active-text)":"var(--done-text)"}},( tasks[person]?.length||0)+" offen")));
    if(!tasks[person]?.length)card.appendChild(h("div",{style:{color:"var(--textFaint)",fontSize:"11px"}},"Keine offenen Aufgaben"));
    else{const list=h("div",{style:{display:"grid",gap:"5px"}});tasks[person].forEach(t=>list.appendChild(h("div",{style:{padding:"7px 9px",background:"var(--bg)",borderRadius:"4px",border:"1px solid var(--"+t.status+"-border)",display:"flex",alignItems:"center",gap:"7px"}},h("span",{className:"dot "+t.status}),h("div",null,h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text)"}},t.con),h("div",{style:{fontSize:"10px",color:"var(--textMuted)"}},t.step)))));card.appendChild(list);}
    grid.appendChild(card);
  });
  frag.appendChild(grid);return frag;
}

// ─── Global click handler ───
document.addEventListener("click",e=>{
  // Close popup — if click is NOT inside the popup or the active cell
  if(state.activeCell){
    const isPopup=e.target.closest("#status-popup");
    const isCell=e.target.closest("[data-cellkey]");
    if(!isPopup&&!isCell){
      state.activeCell=null;
      const old=document.getElementById("status-popup");
      if(old)old.remove();
      render();
    }
  }
  // Close column visibility menu
  if(state.showColVisMenu&&!e.target.closest(".btn-colvis")&&!e.target.closest(".colvis-menu")){
    state.showColVisMenu=false;
    render();
  }
});
// Close popup on scroll or resize to avoid mispositioned popups
window.addEventListener("scroll",()=>{
  if(state.activeCell){
    state.activeCell=null;
    const old=document.getElementById("status-popup");
    if(old)old.remove();
    render();
  }
},{passive:true});
window.addEventListener("resize",()=>{
  if(state.activeCell){
    state.activeCell=null;
    const old=document.getElementById("status-popup");
    if(old)old.remove();
    render();
  }
});
auth.onAuthStateChanged(user=>{state.user=user;if(user)loadData();else{if(unsubscribe)unsubscribe();}render();});
</script>
